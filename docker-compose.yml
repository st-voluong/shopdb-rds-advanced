version: '3.8'
services:
  backend-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopdb-backend-container
    restart: always
    environment:
      - PORT=${PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - DB_MASTER_HOST=${DB_MASTER_HOST}
      - DB_REPLICA_HOST=${DB_REPLICA_HOST}
    networks:
      - shopdb-vpc-network
  
  frontend-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopdb-frontend-container
    restart: always
    depends_on:
      - backend-api
    networks:
      - shopdb-vpc-network
  
  nginx-alb:
    image: nginx:1.25-alpine
    container_name: shopdb-nginx-alb
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-web
      - backend-api
    networks:
      - shopdb-vpc-network

networks:
  shopdb-vpc-network:
    driver: bridge