services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-local-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: voluongdev@hihihehe
      MYSQL_DATABASE: shopdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks: 
      - shopdb-vpc-network
  
  backend-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopdb-backend-container
    restart: always
    environment:
      - PORT=5000
      - DB_USER=root
      - DB_PASSWORD=voluongdev@hihihehe
      - DB_NAME=shopdb
      - DB_PORT=3306
      - DB_MASTER_HOST=mysql-db
      - DB_REPLICA_HOST=mysql-db
    depends_on:
      - mysql-db
    networks:
      - shopdb-vpc-network
  
  frontend-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopdb-frontend-container
    restart: always
    depends_on:
      - backend-api
    networks:
      - shopdb-vpc-network
  
  nginx-alb:
    image: nginx:1.25-alpine
    container_name: shopdb-nginx-alb
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-web
      - backend-api
    networks:
      - shopdb-vpc-network

volumes:
  mysql_data:

networks:
  shopdb-vpc-network:
    driver: bridge
